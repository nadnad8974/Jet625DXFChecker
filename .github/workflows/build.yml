name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ezdxf

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name Jet625DXFChecker jet_625_dxf_validator.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jet625DXFChecker-Windows
          path: dist/Jet625DXFChecker.exe
